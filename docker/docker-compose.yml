services:
  data-init:
    image: alpine:3.21
    user: root
    volumes:
      - fireman-data:/data
    entrypoint: ["sh", "-c", "mkdir -p /data && chown 65532:65532 /data"]
    restart: "no"

  backend:
    image: fireman
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: fireman-backend
    ports:
      - "8080:8080"
    volumes:
      - fireman-data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
      market-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/fireman", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    image: fireman-web
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://backend:8080
    container_name: fireman-web
    environment:
      NODE_ENV: "production"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const h=require('http');const ok=(u)=>new Promise(r=>h.get(u,res=>r(res.statusCode===200)).on('error',()=>r(false)));Promise.all([ok('http://127.0.0.1:3000/'),ok('http://127.0.0.1:3000/api/v1/plans')]).then(([a,b])=>process.exit(a&&b?0:1))\""
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  market-provider:
    image: fireman-market-provider
    build:
      context: ../sidecars/market-provider
      dockerfile: Dockerfile
    container_name: fireman-market-provider
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "18081:18081"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:18081/healthz', timeout=2).status == 200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  fireman-data:
