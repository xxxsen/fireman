services:
  data-init:
    image: alpine:3.21
    user: root
    volumes:
      - fireman-data:/data
      - fireman-provider-cache:/cache
    # Backend (distroless nonroot, uid 65532) owns /data; the sidecar worker
    # runs as the same uid so it can open the shared SQLite files in WAL mode.
    entrypoint: ["sh", "-c", "mkdir -p /data /cache && chown 65532:65532 /data /cache"]
    restart: "no"

  backend:
    image: fireman
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: fireman-backend
    ports:
      - "8080:8080"
    # The internal API (:8081, resource upload + post-process) is reachable by
    # the sidecar over the compose network only and must not be published.
    volumes:
      - fireman-data:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/fireman", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    image: fireman-web
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://backend:8080
    container_name: fireman-web
    environment:
      NODE_ENV: "production"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const h=require('http');const ok=(u)=>new Promise(r=>h.get(u,res=>r(res.statusCode===200)).on('error',()=>r(false)));Promise.all([ok('http://127.0.0.1:3000/'),ok('http://127.0.0.1:3000/api/v1/plans')]).then(([a,b])=>process.exit(a&&b?0:1))\""
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  market-provider:
    image: fireman-market-provider
    build:
      context: ../sidecars/market-provider
      dockerfile: Dockerfile
    container_name: fireman-market-provider
    # Share uid with the backend so the worker can write worker_tasks in the
    # shared SQLite main DB (WAL requires write access to db/-wal/-shm files).
    user: "65532:65532"
    environment:
      TZ: "Asia/Shanghai"
      HOME: /tmp
      FIREMAN_DB_PATH: /data/fireman.db
      FIREMAN_INTERNAL_API_URL: http://backend:8081
      MARKET_PROVIDER_MUTUAL_FUND_CACHE_PATH: /cache/mutual_fund_names.json
      MARKET_PROVIDER_MUTUAL_FUND_FETCH_TIMEOUT: "60"
      MARKET_PROVIDER_FETCH_TIMEOUT: "240"
      # TickFlow priority fetch: off by default; enable per environment. With an
      # API key the client targets the paid API, otherwise the free API.
      MARKET_PROVIDER_TICKFLOW_ENABLED: "${MARKET_PROVIDER_TICKFLOW_ENABLED:-false}"
      MARKET_PROVIDER_TICKFLOW_API_KEY: "${MARKET_PROVIDER_TICKFLOW_API_KEY:-}"
      MARKET_PROVIDER_TICKFLOW_BASE_URL: "${MARKET_PROVIDER_TICKFLOW_BASE_URL:-}"
      MARKET_PROVIDER_TICKFLOW_TIMEOUT: "${MARKET_PROVIDER_TICKFLOW_TIMEOUT:-8}"
      MARKET_PROVIDER_TICKFLOW_MAX_RETRIES: "${MARKET_PROVIDER_TICKFLOW_MAX_RETRIES:-0}"
      MARKET_PROVIDER_TICKFLOW_TYPES: "${MARKET_PROVIDER_TICKFLOW_TYPES:-cn_exchange_stock,cn_exchange_fund}"
      MARKET_PROVIDER_TICKFLOW_REQUIRE_ADJUST_NONE: "${MARKET_PROVIDER_TICKFLOW_REQUIRE_ADJUST_NONE:-true}"
    volumes:
      - fireman-data:/data
      - fireman-provider-cache:/cache
    depends_on:
      data-init:
        condition: service_completed_successfully
      # Migrations must run before the worker starts claiming tasks.
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:18081/healthz', timeout=2).status == 200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  fireman-data:
  fireman-provider-cache:
