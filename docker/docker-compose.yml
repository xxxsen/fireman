services:
  backend:
    image: fireman
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: fireman-backend
    ports:
      - "8080:8080"
    volumes:
      - fireman-data:/data
    depends_on:
      market-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/fireman", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    image: fireman-web
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: fireman-web
    environment:
      NODE_ENV: "production"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  market-provider:
    image: fireman-market-provider
    build:
      context: ../sidecars/market-provider
      dockerfile: Dockerfile
    container_name: fireman-market-provider
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "18081:18081"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:18081/healthz', timeout=2).status == 200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  fireman-data:
