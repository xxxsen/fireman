name: docker-image

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.name }}
    if: ${{ github.ref_type == 'tag' && !contains(github.ref_name, '-preview') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            suffix: ""
            context: .
            file: ./Dockerfile
            build-args: ""
          - name: web
            suffix: "-web"
            context: ./web
            file: ./web/Dockerfile
            build-args: |
              API_PROXY_TARGET=http://backend:8080
          - name: market-provider
            suffix: "-market-provider"
            context: ./sidecars/market-provider
            file: ./sidecars/market-provider/Dockerfile
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ secrets.DOCKER_IMAGE_NAME }}${{ matrix.suffix }}:latest
            ${{ secrets.DOCKER_USER }}/${{ secrets.DOCKER_IMAGE_NAME }}${{ matrix.suffix }}:${{ github.ref_name }}
