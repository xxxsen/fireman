name: ci

on:
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: make ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify CI runs without browsers
        shell: bash
        run: |
          if ls "$GITHUB_WORKSPACE"/.devcontainer >/dev/null 2>&1; then
            echo "::error::devcontainer directory present"
            exit 1
          fi
          if find "$GITHUB_WORKSPACE" -path "*/node_modules" -prune -o -type f \( -name "playwright.config.*" -o -name "cypress.config.*" \) -print | grep -q .; then
            echo "::error::E2E config detected (Playwright/Cypress)"
            exit 1
          fi

      - name: Run make ci (no network beyond lock files)
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: make ci
